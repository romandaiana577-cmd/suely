<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Feirão | Oferta Liberada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            /* FUNDO: Paleta Sunset Vibrante */
            background: linear-gradient(-45deg, #6222cc, #a615bd, #e94057, #f27121, #ffba08);
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partículas de Brilho */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: shine 5s infinite;
        }

        @keyframes shine {
            0%, 100% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 0.5; }
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
            z-index: 5;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 40px;
            font-weight: 800;
            /* Texto com degradê metálico */
            background: linear-gradient(to right, #6222cc, #e94057);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 16px;
            color: #555;
            font-weight: 500;
            margin-bottom: 35px;
        }

        .progress-container {
            background: #eee;
            border-radius: 100px;
            height: 28px;
            padding: 4px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 100px;
            /* Degradê Arco-íris na barra */
            background: linear-gradient(90deg, #6222cc, #e94057, #f27121);
            transition: width 0.3s ease;
        }

        .counter {
            font-size: 38px;
            font-weight: 800;
            margin-top: 20px;
            color: #1a1a1a;
        }

        .btn-cta {
            display: block;
            margin-top: 40px;
            padding: 22px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 18px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-cta:hover {
            transform: translateY(-5px);
            background: #000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <script>
        // Gerador de brilhos aleatórios no fundo
        for (let i = 0; i < 20; i++) {
            let s = document.createElement('div');
            s.className = 'sparkle';
            s.style.width = Math.random() * 8 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(s);
        }
    </script>

    <div class="container">
        <div class="title">MEGA FEIRÃO</div>
        <div class="subtitle">Aguarde, estamos selecionando sua oferta...</div>

        <div class="progress-container">
            <div id="bar" class="progress-bar"></div>
        </div>

        <div id="status" class="counter">0%</div>

        <a href="https://animated-sopapillas-b0bf04.netlify.app/" class="btn-cta">
            APROVEITAR AGORA
        </a>
    </div>

    <script>
        let count = 0;
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');

        const interval = setInterval(() => {
            count += Math.floor(Math.random() * 4) + 1;
            
            if (count >= 100) {
                count = 100;
                clearInterval(interval);
                status.innerText = "LIBERADO!";
                status.style.color = "#e94057";
            } else {
                status.innerText = count + "%";
            }
            
            bar.style.width = count + "%";
        }, 70);
    </script>
</body>
</html>
